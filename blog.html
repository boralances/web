<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boralances - Blog</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap');
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Rajdhani',sans-serif;background:#0a0e27;color:#fff;overflow-x:hidden;line-height:1.6}
        .cyber-grid{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(90deg,rgba(0,255,255,0.03) 1px,transparent 1px),linear-gradient(rgba(0,255,255,0.03) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;z-index:1}

        /* ── NAV ── */
        header{position:relative;z-index:10;padding:20px 0;background:rgba(10,14,39,0.85);backdrop-filter:blur(10px);border-bottom:2px solid #0ff;box-shadow:0 0 20px rgba(0,255,255,0.5)}
        nav{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;padding:0 20px}
        .logo{font-size:28px;font-weight:900;font-family:'Orbitron',sans-serif;color:#0ff;text-shadow:0 0 10px #0ff,0 0 20px #0ff;letter-spacing:3px;animation:logoGlow 3s ease-in-out infinite;text-decoration:none}
        @keyframes logoGlow{0%,100%{text-shadow:0 0 10px #0ff,0 0 20px #0ff}50%{text-shadow:0 0 20px #0ff,0 0 40px #0ff,0 0 60px #0ff}}
        .nav-links{display:flex;gap:24px;list-style:none;align-items:center}
        .nav-links a{color:#fff;text-decoration:none;font-size:16px;font-weight:600;padding:8px 16px;border:2px solid transparent;transition:all 0.4s;position:relative;text-transform:uppercase;letter-spacing:2px}
        .nav-links a::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(45deg,#0ff,#f0f);opacity:0;transition:opacity 0.3s;z-index:-1;filter:blur(20px)}
        .nav-links a:hover::before{opacity:0.7}
        .nav-links a:hover{color:#0ff;border:2px solid #0ff;box-shadow:0 0 20px #0ff,inset 0 0 10px rgba(0,255,255,0.3);text-shadow:0 0 10px #0ff;transform:translateY(-3px)}
        .nav-mun{background:linear-gradient(135deg,rgba(56,139,253,0.15),rgba(56,139,253,0.05));border:2px solid rgba(56,139,253,0.6)!important;color:#388bfd!important;font-size:14px!important;letter-spacing:1px!important;border-radius:4px;display:flex!important;align-items:center;gap:6px}
        .nav-mun:hover{color:#6db3ff!important;border-color:#388bfd!important;box-shadow:0 0 20px rgba(56,139,253,0.5)!important;text-shadow:0 0 10px #388bfd!important;background:linear-gradient(135deg,rgba(56,139,253,0.25),rgba(56,139,253,0.1))!important}

        /* ── LAYOUT ── */
        main{position:relative;z-index:5;max-width:900px;margin:0 auto;padding:40px 20px}

        /* ── HERO ── */
        .blog-hero{text-align:center;padding:60px 20px 40px}
        .blog-hero h1{font-size:clamp(2rem,6vw,4rem);font-family:'Orbitron',sans-serif;font-weight:900;color:#0ff;text-shadow:0 0 20px #0ff,0 0 40px #0ff;letter-spacing:4px;animation:glow 2s ease-in-out infinite alternate;margin-bottom:12px}
        @keyframes glow{from{text-shadow:0 0 20px #0ff,0 0 40px #0ff}to{text-shadow:0 0 30px #0ff,0 0 60px #0ff,0 0 80px #f0f}}
        .blog-hero p{font-size:1.1em;color:#f0f;text-shadow:0 0 10px #f0f;letter-spacing:3px}

        /* ── LOADING STATE ── */
        #loader{text-align:center;padding:60px 20px}
        .loader-bar{width:100%;max-width:400px;height:4px;background:rgba(0,255,255,0.1);border-radius:2px;margin:20px auto;overflow:hidden}
        .loader-fill{height:100%;background:linear-gradient(90deg,#0ff,#f0f);border-radius:2px;width:0%;transition:width 0.3s}
        .loader-text{font-family:'Orbitron',sans-serif;font-size:0.8rem;color:#0ff;letter-spacing:0.15em;margin-bottom:8px}
        .loader-sub{font-size:0.85rem;color:#555;margin-top:6px}

        /* ── EMPTY STATE ── */
        #empty-state{display:none;text-align:center;padding:80px 20px}
        #empty-state h2{font-family:'Orbitron',sans-serif;font-size:1.5rem;color:#333;letter-spacing:3px;margin-bottom:16px}
        #empty-state p{color:#555;font-size:1rem}

        /* ── POST LIST ── */
        #posts-container{display:none}
        .posts-count{font-size:0.7rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#555;margin-bottom:28px;padding-bottom:12px;border-bottom:1px solid rgba(0,255,255,0.1)}
        .posts-count span{color:#0ff}

        /* ── POST CARD (list view) ── */
        .post-card{background:rgba(20,25,50,0.6);border:2px solid rgba(0,255,255,0.2);border-radius:4px;padding:28px 32px;margin-bottom:20px;cursor:pointer;transition:all 0.35s;position:relative;overflow:hidden}
        .post-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(to bottom,#0ff,#f0f);transform:scaleY(0);transform-origin:top;transition:transform 0.35s}
        .post-card:hover::before{transform:scaleY(1)}
        .post-card:hover{border-color:rgba(0,255,255,0.6);transform:translateX(6px);box-shadow:0 8px 30px rgba(0,255,255,0.15)}
        .post-num{font-family:'Orbitron',sans-serif;font-size:0.65rem;color:#444;letter-spacing:0.14em;margin-bottom:6px}
        .post-title{font-family:'Orbitron',sans-serif;font-size:1.15rem;color:#0ff;text-shadow:0 0 8px rgba(0,255,255,0.4);letter-spacing:1px;margin-bottom:8px;line-height:1.3}
        .post-excerpt{font-size:0.95rem;color:#888;font-weight:300;line-height:1.6;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        .post-meta{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
        .post-tag{font-size:0.65rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:2px 8px;border-radius:2px;background:rgba(255,0,255,0.1);border:1px solid rgba(255,0,255,0.3);color:#f0f}
        .post-read{font-size:0.7rem;color:#555;letter-spacing:0.08em;margin-left:auto}

        /* ── SINGLE POST VIEW ── */
        #post-view{display:none}
        .back-btn{display:inline-flex;align-items:center;gap:8px;background:transparent;border:1px solid rgba(0,255,255,0.3);color:#0ff;font-family:'Orbitron',sans-serif;font-size:0.7rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:9px 18px;cursor:pointer;transition:all 0.3s;margin-bottom:32px}
        .back-btn:hover{background:rgba(0,255,255,0.08);border-color:#0ff;box-shadow:0 0 16px rgba(0,255,255,0.2)}
        .post-header{margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid rgba(0,255,255,0.15)}
        .post-header .post-num{font-family:'Orbitron',sans-serif;font-size:0.7rem;color:#555;letter-spacing:0.16em;margin-bottom:10px}
        .post-header h1{font-family:'Orbitron',sans-serif;font-size:clamp(1.4rem,4vw,2.4rem);color:#0ff;text-shadow:0 0 15px rgba(0,255,255,0.5);letter-spacing:2px;line-height:1.2;margin-bottom:14px}
        .post-header .post-meta{display:flex;gap:10px;flex-wrap:wrap}

        /* ── MARKDOWN RENDERED CONTENT ── */
        .post-content{font-size:1.05rem;line-height:1.85;color:#ccc;font-weight:300}
        .post-content h1{font-family:'Orbitron',sans-serif;font-size:1.8rem;color:#0ff;text-shadow:0 0 10px rgba(0,255,255,0.4);letter-spacing:2px;margin:36px 0 16px;padding-bottom:10px;border-bottom:2px solid rgba(0,255,255,0.2)}
        .post-content h2{font-family:'Orbitron',sans-serif;font-size:1.4rem;color:#f0f;text-shadow:0 0 8px rgba(255,0,255,0.3);letter-spacing:1px;margin:30px 0 14px}
        .post-content h3{font-size:1.15rem;font-weight:700;color:#0ff;letter-spacing:0.5px;margin:24px 0 10px}
        .post-content h4{font-size:1rem;font-weight:700;color:#aaa;margin:18px 0 8px}
        .post-content p{margin-bottom:16px}
        .post-content a{color:#0ff;text-decoration:none;border-bottom:1px solid rgba(0,255,255,0.3);transition:all 0.2s}
        .post-content a:hover{text-shadow:0 0 8px #0ff;border-bottom-color:#0ff}
        .post-content strong{color:#fff;font-weight:700}
        .post-content em{color:#f0f;font-style:italic}
        .post-content ul,.post-content ol{margin:12px 0 16px 24px}
        .post-content li{margin-bottom:6px;color:#bbb}
        .post-content li::marker{color:#0ff}
        .post-content blockquote{border-left:3px solid #f0f;margin:20px 0;padding:14px 20px;background:rgba(255,0,255,0.05);color:#bbb;font-style:italic}
        .post-content blockquote::before{content:'';display:block}
        .post-content code{font-family:'Courier New',monospace;background:rgba(0,255,255,0.08);border:1px solid rgba(0,255,255,0.2);color:#0ff;padding:2px 7px;border-radius:2px;font-size:0.88em}
        .post-content pre{background:rgba(0,0,0,0.6);border:1px solid rgba(0,255,255,0.2);border-left:3px solid #0ff;padding:20px;border-radius:4px;overflow-x:auto;margin:20px 0}
        .post-content pre code{background:none;border:none;padding:0;font-size:0.9em;color:#0ff}
        .post-content hr{border:none;border-top:1px solid rgba(0,255,255,0.15);margin:32px 0}
        .post-content img{max-width:100%;border:2px solid rgba(0,255,255,0.2);border-radius:4px;margin:16px 0}
        .post-content table{width:100%;border-collapse:collapse;margin:20px 0;font-size:0.95rem}
        .post-content th{background:rgba(0,255,255,0.1);border:1px solid rgba(0,255,255,0.2);padding:10px 14px;color:#0ff;font-weight:700;text-align:left}
        .post-content td{border:1px solid rgba(0,255,255,0.1);padding:9px 14px;color:#bbb}
        .post-content tr:hover td{background:rgba(0,255,255,0.04)}

        /* ── FOOTER ── */
        footer{position:relative;z-index:10;text-align:center;padding:30px;background:rgba(10,14,39,0.9);border-top:2px solid #f0f;box-shadow:0 0 20px rgba(255,0,255,0.5);margin-top:60px}
        footer p{color:#0ff;text-shadow:0 0 10px #0ff}

        @media(max-width:768px){.nav-links{flex-direction:column;gap:10px}.post-card{padding:20px}}
    </style>
</head>
<body>
<div class="cyber-grid"></div>

<header>
    <nav>
        <a href="index.html" class="logo">BORALANCES</a>
        <ul class="nav-links">
            <li><a href="server.html">Server</a></li>

                <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M8 3.5a.5.5 0 0 0-1 0V9a.5.5 0 0 0 .252.434l3.5 2a.5.5 0 0 0 .496-.868L8 8.71V3.5z"/><path d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16zm7-8A7 7 0 1 1 1 8a7 7 0 0 1 14 0z"/></svg>
                MUN Chair
            </a></li>
        </ul>
    </nav>
</header>

<main>
    <div class="blog-hero">
        <h1>BLOG</h1>
        <p>&gt;&gt;&gt; Güncellemeler &amp; Yazılar &lt;&lt;&lt;</p>
    </div>

    <!-- LOADING -->
    <div id="loader">
        <div class="loader-text" id="loader-text">TARANIY0R...</div>
        <div class="loader-bar"><div class="loader-fill" id="loader-fill"></div></div>
        <div class="loader-sub" id="loader-sub">1.md okunuyor...</div>
    </div>

    <!-- EMPTY -->
    <div id="empty-state">
        <h2>HENÜZ YAZI YOK</h2>
        <p>Blog yazıları için bu klasöre <code style="color:#0ff">1.md</code>, <code style="color:#0ff">2.md</code> ... şeklinde dosyalar ekle.</p>
    </div>

    <!-- POST LIST -->
    <div id="posts-container">
        <div class="posts-count" id="posts-count"></div>
        <div id="posts-list"></div>
    </div>

    <!-- SINGLE POST -->
    <div id="post-view">
        <button class="back-btn" onclick="showList()">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path fill-rule="evenodd" d="M11.354 1.646a.5.5 0 0 1 0 .708L5.707 8l5.647 5.646a.5.5 0 0 1-.708.708l-6-6a.5.5 0 0 1 0-.708l6-6a.5.5 0 0 1 .708 0z"/></svg>
            Tüm Yazılar
        </button>
        <div class="post-header">
            <div class="post-num" id="view-num"></div>
            <h1 id="view-title"></h1>
            <div class="post-meta" id="view-meta"></div>
        </div>
        <div class="post-content" id="view-body"></div>
    </div>
</main>

<footer>
    <p>&copy; 2026 BORALANCES — All Rights Reserved in the Digital Realm</p>
</footer>

<script>
// ── CONFIG ──
// GitHub kullanıyorsan: 'https://raw.githubusercontent.com/KULLANICI/REPO/main/posts/'
// Yerel sunucu kullanıyorsan: 'posts/'
// Aynı dizinde ise: ''
const POSTS_DIR = 'https://raw.githubusercontent.com/boralances/web/main/posts/';
const TOTAL = 1000;

// ── STATE ──
let allPosts = []; // { num, title, excerpt, raw, tags, readTime }

// ── MARKDOWN PARSER ── (lightweight, no dependency)
function parseMarkdown(md) {
    let html = md
        // Escape HTML first
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        // Code blocks (before inline code)
        .replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
            `<pre><code class="lang-${lang}">${code.trim()}</code></pre>`)
        // Inline code
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        // Headers
        .replace(/^#### (.+)$/gm, '<h4>$1</h4>')
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        // Bold + italic
        .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        // Blockquote
        .replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>')
        // Horizontal rule
        .replace(/^---+$/gm, '<hr>')
        // Images (before links)
        .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2">')
        // Links
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
        // Unordered lists
        .replace(/^\s*[-*+] (.+)$/gm, '<li>$1</li>')
        // Ordered lists
        .replace(/^\s*\d+\. (.+)$/gm, '<li>$1</li>')
        // Tables
        .replace(/^\|(.+)\|\s*\n\|[-| :]+\|\s*\n((?:\|.+\|\s*\n?)*)/gm, (match, header, rows) => {
            const th = header.split('|').filter(c=>c.trim()).map(c=>`<th>${c.trim()}</th>`).join('');
            const trs = rows.trim().split('\n').map(row => {
                const tds = row.split('|').filter(c=>c.trim()).map(c=>`<td>${c.trim()}</td>`).join('');
                return `<tr>${tds}</tr>`;
            }).join('');
            return `<table><thead><tr>${th}</tr></thead><tbody>${trs}</tbody></table>`;
        });

    // Wrap consecutive <li> tags in <ul>
    html = html.replace(/(<li>[\s\S]*?<\/li>(\s*<li>[\s\S]*?<\/li>)*)/g, '<ul>$1</ul>');

    // Paragraphs — lines not already wrapped in block tags
    const blockTags = ['<h1','<h2','<h3','<h4','<ul','<ol','<li','<pre','<blockquote','<hr','<table','<img','<tr','<th','<td'];
    html = html.split('\n').map(line => {
        const trimmed = line.trim();
        if (!trimmed) return '';
        const isBlock = blockTags.some(tag => trimmed.startsWith(tag));
        return isBlock ? trimmed : `<p>${trimmed}</p>`;
    }).join('\n');

    return html;
}

// ── EXTRACT TITLE from markdown ──
function extractTitle(raw, num) {
    const h1 = raw.match(/^#\s+(.+)$/m);
    if (h1) return h1[1].trim();
    const firstLine = raw.trim().split('\n')[0].replace(/^#+\s*/, '').trim();
    return firstLine || `Yazı #${num}`;
}

// ── EXTRACT EXCERPT ──
function extractExcerpt(raw) {
    const lines = raw.trim().split('\n');
    for (const line of lines) {
        const clean = line.replace(/^#+\s*/, '').replace(/[*_`]/g, '').trim();
        if (clean.length > 30) return clean.slice(0, 160) + (clean.length > 160 ? '…' : '');
    }
    return '';
}

// ── EXTRACT TAGS from frontmatter or #hashtags ──
function extractTags(raw) {
    // frontmatter: tags: [a, b] or tags: a, b
    const fm = raw.match(/^tags:\s*\[?([^\]\n]+)\]?/mi);
    if (fm) return fm[1].split(',').map(t => t.trim().replace(/['"]/g, '')).filter(Boolean).slice(0, 4);
    // inline hashtags
    const ht = raw.match(/#(\w+)/g);
    if (ht) return [...new Set(ht.map(h => h.slice(1)))].slice(0, 4);
    return [];
}

// ── ESTIMATE READ TIME ──
function readTime(raw) {
    const words = raw.trim().split(/\s+/).length;
    const mins = Math.max(1, Math.round(words / 200));
    return `${mins} dk okuma`;
}

// ── FETCH A SINGLE .md FILE ──
async function fetchPost(num) {
    const url = `${POSTS_DIR}${num}.md`;
    try {
        const res = await fetch(url, { cache: 'no-store' });
        if (!res.ok) return null;
        const text = await res.text();
        if (!text || text.trim().length === 0) return null;
        return text;
    } catch {
        return null;
    }
}

// ── LOAD ALL POSTS — stop at first missing/empty file ──
async function loadAllPosts() {
    const loaderText = document.getElementById('loader-text');
    const loaderFill = document.getElementById('loader-fill');
    const loaderSub  = document.getElementById('loader-sub');

    // Show where we're reading from
    const source = POSTS_DIR.includes('raw.githubusercontent') ? 'GitHub' : 'Yerel';
    loaderText.textContent = source + " TARANIY0R...";

    for (let i = 1; i <= TOTAL; i++) {
        loaderSub.textContent  = source + ' — ' + i + '.md okunuyor...';
        loaderFill.style.width = (i / TOTAL * 100) + '%';

        const raw = await fetchPost(i);

        if (!raw) break; // ilk boş veya bulunamayan dosyada dur

        allPosts.push({
            num:      i,
            raw,
            title:    extractTitle(raw, i),
            excerpt:  extractExcerpt(raw),
            tags:     extractTags(raw),
            readTime: readTime(raw),
        });

        loaderText.textContent = allPosts.length + ' YAZI BULUNDU';
        await new Promise(r => setTimeout(r, 0));
    }

    document.getElementById('loader').style.display = 'none';

    if (allPosts.length === 0) {
        document.getElementById('empty-state').style.display = 'block';
        return;
    }

    renderList();
}

// ── RENDER LIST ──
function renderList() {
    const container = document.getElementById('posts-container');
    const list      = document.getElementById('posts-list');
    const count     = document.getElementById('posts-count');

    count.innerHTML = `<span>${allPosts.length}</span> yazı bulundu`;
    list.innerHTML  = allPosts.map(post => `
        <div class="post-card" onclick="openPost(${post.num})">
            <div class="post-num"># ${String(post.num).padStart(4, '0')}</div>
            <div class="post-title">${escHtml(post.title)}</div>
            ${post.excerpt ? `<div class="post-excerpt">${escHtml(post.excerpt)}</div>` : ''}
            <div class="post-meta">
                ${post.tags.map(t => `<span class="post-tag">${escHtml(t)}</span>`).join('')}
                <span class="post-read">${post.readTime}</span>
            </div>
        </div>
    `).join('');

    container.style.display = 'block';
}

// ── OPEN SINGLE POST ──
function openPost(num) {
    const post = allPosts.find(p => p.num === num);
    if (!post) return;

    document.getElementById('posts-container').style.display = 'none';
    document.getElementById('post-view').style.display = 'block';
    document.querySelector('.blog-hero').style.display = 'none';

    document.getElementById('view-num').textContent   = `# ${String(post.num).padStart(4, '0')}`;
    document.getElementById('view-title').textContent = post.title;
    document.getElementById('view-meta').innerHTML    =
        post.tags.map(t => `<span class="post-tag">${escHtml(t)}</span>`).join('') +
        `<span class="post-read" style="margin-left:auto">${post.readTime}</span>`;
    document.getElementById('view-body').innerHTML    = parseMarkdown(post.raw);

    window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── BACK TO LIST ──
function showList() {
    document.getElementById('post-view').style.display      = 'none';
    document.getElementById('posts-container').style.display = 'block';
    document.querySelector('.blog-hero').style.display       = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── UTIL ──
function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── BOOT ──
loadAllPosts();
</script>
</body>
</html>
