<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Boralances · Profilim</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#060a12;--bg2:#0c1422;--bg3:#111d2e;
  --cyan:#0ff;--magenta:#f0f;--blue:#388bfd;
  --text:#e8f0fe;--text2:#8aaccc;--text3:#4a6580;
  --green:#3de8a0;--red:#f85149;
}
body{font-family:'Rajdhani',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.cyber-grid{position:fixed;inset:0;background:linear-gradient(90deg,rgba(255,0,255,0.015) 1px,transparent 1px),linear-gradient(rgba(255,0,255,0.015) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;z-index:0}

/* Header */
header{position:relative;z-index:10;padding:16px 0;background:rgba(10,14,39,0.9);backdrop-filter:blur(10px);border-bottom:2px solid var(--magenta);box-shadow:0 0 30px rgba(255,0,255,0.25)}
nav{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;padding:0 24px;flex-wrap:wrap;gap:12px}
.logo{font-size:22px;font-weight:900;font-family:'Orbitron',sans-serif;color:var(--magenta);text-shadow:0 0 15px var(--magenta);letter-spacing:3px;text-decoration:none}
.nav-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.nav-badge{font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;padding:4px 12px;border-radius:6px}
.badge-user{background:rgba(255,0,255,0.1);border:1px solid rgba(255,0,255,0.3);color:var(--magenta)}
.badge-mod{background:rgba(0,255,255,0.1);border:1px solid rgba(0,255,255,0.3);color:var(--cyan)}
.badge-admin{background:rgba(255,215,0,0.15);border:1px solid rgba(255,215,0,0.3);color:#ffd700}
.nav-user{font-size:13px;color:var(--text2)}
.btn-nav{font-size:12px;padding:6px 14px;border-radius:6px;cursor:pointer;border:1px solid rgba(255,255,255,0.1);background:none;color:var(--text3);font-family:'Rajdhani',sans-serif;font-weight:600;transition:all 0.2s;text-decoration:none}
.btn-nav:hover{border-color:rgba(255,0,255,0.3);color:var(--magenta)}
.btn-logout{border-color:rgba(248,81,73,0.3);color:var(--red)}
.btn-logout:hover{background:rgba(248,81,73,0.1);border-color:var(--red)}

/* Layout */
main{position:relative;z-index:5;max-width:900px;margin:0 auto;padding:32px 24px}

/* Profile Card */
.profile-card{background:rgba(12,20,34,0.8);border:1px solid rgba(255,0,255,0.2);border-radius:16px;padding:32px;margin-bottom:32px;position:relative;overflow:hidden}
.profile-card::before{content:'';position:absolute;top:0;right:0;width:200px;height:200px;background:radial-gradient(circle,rgba(255,0,255,0.06),transparent);border-radius:50%}
.profile-top{display:flex;align-items:center;gap:20px;margin-bottom:24px;flex-wrap:wrap}
.profile-avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--magenta),var(--cyan));display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:32px;font-weight:900;color:#000;flex-shrink:0;box-shadow:0 0 20px rgba(255,0,255,0.3)}
.profile-info h2{font-family:'Orbitron',sans-serif;font-size:1.5rem;color:var(--magenta);text-shadow:0 0 10px rgba(255,0,255,0.3);letter-spacing:2px}
.profile-info .username{font-size:13px;color:var(--text3);letter-spacing:0.1em}
.profile-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:16px}
.profile-stat{text-align:center;padding:16px;background:rgba(0,0,0,0.3);border-radius:10px;border:1px solid rgba(255,255,255,0.04)}
.profile-stat-value{font-family:'Orbitron',sans-serif;font-size:1.5rem;font-weight:900;color:var(--cyan)}
.profile-stat-label{font-size:11px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;margin-top:4px}

/* Tabs */
.panel-tabs{display:flex;gap:4px;margin-bottom:28px;border-bottom:1px solid rgba(255,0,255,0.15);flex-wrap:wrap}
.panel-tab{padding:12px 20px;font-size:13px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;
  cursor:pointer;background:none;border:none;color:var(--text3);transition:all 0.2s;
  border-bottom:2px solid transparent;font-family:'Rajdhani',sans-serif}
.panel-tab:hover{color:var(--text2)}
.panel-tab.active{color:var(--magenta);border-bottom-color:var(--magenta)}

/* Sections */
.panel-section{display:none}
.panel-section.active{display:block;animation:fadeIn 0.3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* My Comments */
.my-comment{background:rgba(12,20,34,0.6);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:16px;margin-bottom:10px;transition:all 0.2s}
.my-comment:hover{border-color:rgba(255,0,255,0.2)}
.my-comment.pinned{border-color:rgba(61,232,160,0.3);background:rgba(61,232,160,0.03)}
.my-comment-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-wrap:wrap;gap:8px}
.my-comment-post{font-size:12px;color:var(--cyan);font-weight:700}
.my-comment-date{font-size:11px;color:var(--text3)}
.my-comment-text{font-size:14px;color:var(--text2);line-height:1.5;margin-bottom:10px}
.my-comment-actions{display:flex;gap:6px}
.btn-sm{font-size:11px;padding:4px 10px;border-radius:5px;cursor:pointer;border:none;font-family:'Rajdhani',sans-serif;font-weight:700;transition:all 0.15s}
.btn-edit{background:rgba(255,0,255,0.1);border:1px solid rgba(255,0,255,0.25);color:var(--magenta)}
.btn-edit:hover{background:rgba(255,0,255,0.2)}
.btn-delete{background:rgba(248,81,73,0.1);border:1px solid rgba(248,81,73,0.25);color:var(--red)}
.btn-delete:hover{background:rgba(248,81,73,0.2)}

/* Password Change Section */
.settings-card{background:rgba(12,20,34,0.6);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:24px}
.settings-card h3{font-family:'Orbitron',sans-serif;font-size:14px;color:var(--magenta);letter-spacing:0.12em;margin-bottom:20px}
.field{margin-bottom:14px}
.field label{display:block;font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
.field input{width:100%;max-width:360px;padding:11px 14px;border-radius:8px;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.1);color:var(--text);font-size:14px;font-family:'Rajdhani',sans-serif;outline:none;transition:border-color 0.2s}
.field input:focus{border-color:rgba(255,0,255,0.4)}
.btn-save{padding:10px 24px;border-radius:8px;font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.12em;cursor:pointer;border:none;transition:all 0.2s;
  background:linear-gradient(135deg,rgba(255,0,255,0.15),rgba(255,0,255,0.08));border:1px solid rgba(255,0,255,0.35);color:var(--magenta)}
.btn-save:hover{box-shadow:0 0 16px rgba(255,0,255,0.2)}
.btn-save:disabled{opacity:0.5;cursor:not-allowed}
.settings-msg{font-size:12px;margin-top:10px;font-weight:600}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal-box{background:rgba(12,20,34,0.98);border:1px solid rgba(255,0,255,0.3);border-radius:14px;padding:28px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.modal-title{font-family:'Orbitron',sans-serif;font-size:14px;color:var(--magenta);letter-spacing:0.12em;margin-bottom:20px}
.modal-field{margin-bottom:14px}
.modal-field label{display:block;font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
.modal-field textarea{width:100%;padding:10px 14px;border-radius:8px;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.1);color:var(--text);font-size:14px;font-family:'Rajdhani',sans-serif;outline:none;resize:vertical;min-height:100px}
.modal-actions{display:flex;gap:10px;margin-top:16px}
.btn-modal{padding:10px 20px;border-radius:8px;font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.12em;cursor:pointer;border:none;transition:all 0.2s}
.btn-modal-primary{background:linear-gradient(135deg,rgba(255,0,255,0.15),rgba(255,0,255,0.08));border:1px solid rgba(255,0,255,0.35);color:var(--magenta)}
.btn-modal-primary:hover{box-shadow:0 0 16px rgba(255,0,255,0.2)}
.btn-modal-cancel{background:none;border:1px solid rgba(255,255,255,0.1);color:var(--text3)}
.btn-modal-cancel:hover{border-color:rgba(248,81,73,0.3);color:var(--red)}

/* Empty */
.empty-state{text-align:center;padding:50px 20px;color:var(--text3)}
.empty-state .empty-icon{font-size:48px;margin-bottom:12px;opacity:0.5}

/* Footer */
footer{position:relative;z-index:10;text-align:center;padding:24px;background:rgba(10,14,39,0.9);border-top:2px solid var(--magenta);box-shadow:0 0 20px rgba(255,0,255,0.25);margin-top:60px}
footer p{color:var(--magenta);font-size:13px;letter-spacing:0.1em}

@media(max-width:768px){.profile-top{flex-direction:column;text-align:center}.profile-stats{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="cyber-grid"></div>

<header>
  <nav>
    <a href="index.html" class="logo">BORALANCES</a>
    <div class="nav-right">
      <span class="nav-badge badge-user" id="nav-role-badge">👤 Kullanıcı</span>
      <span class="nav-user" id="nav-user"></span>
      <a href="blog.html" class="btn-nav">Blog</a>
      <a href="index.html" class="btn-nav">Ana Sayfa</a>
      <button class="btn-nav btn-logout" onclick="logout()">Çıkış</button>
    </div>
  </nav>
</header>

<main>
  <!-- Profile Card -->
  <div class="profile-card">
    <div class="profile-top">
      <div class="profile-avatar" id="avatar">?</div>
      <div class="profile-info">
        <h2 id="display-name">Yükleniyor...</h2>
        <div class="username" id="username">@...</div>
      </div>
    </div>
    <div class="profile-stats">
      <div class="profile-stat">
        <div class="profile-stat-value" id="ps-comments">-</div>
        <div class="profile-stat-label">Yorumlarım</div>
      </div>
      <div class="profile-stat">
        <div class="profile-stat-value" id="ps-role">-</div>
        <div class="profile-stat-label">Rol</div>
      </div>
      <div class="profile-stat">
        <div class="profile-stat-value" id="ps-joined">-</div>
        <div class="profile-stat-label">Kayıt</div>
      </div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="panel-tabs">
    <button class="panel-tab active" onclick="showSection('comments',this)">💬 Yorumlarım</button>
    <button class="panel-tab" onclick="showSection('settings',this)">⚙️ Ayarlar</button>
  </div>

  <!-- My Comments -->
  <div class="panel-section active" id="sec-comments">
    <div id="my-comments-list"></div>
  </div>

  <!-- Settings -->
  <div class="panel-section" id="sec-settings">
    <div class="settings-card">
      <h3>🔑 Şifre Değiştir</h3>
      <div class="field">
        <label>Mevcut Şifre</label>
        <input type="password" id="pw-current" placeholder="••••••••">
      </div>
      <div class="field">
        <label>Yeni Şifre</label>
        <input type="password" id="pw-new" placeholder="en az 6 karakter">
      </div>
      <div class="field">
        <label>Yeni Şifre Tekrar</label>
        <input type="password" id="pw-new2" placeholder="yeni şifreyi tekrar girin">
      </div>
      <button class="btn-save" id="btn-pw" onclick="changePassword()">Şifreyi Güncelle</button>
      <div class="settings-msg" id="pw-msg"></div>
    </div>

    <div class="settings-card" style="margin-top:20px">
      <h3>👤 Görünen İsim Değiştir</h3>
      <div class="field">
        <label>Yeni Görünen İsim</label>
        <input type="text" id="new-display" placeholder="yeni isminiz">
      </div>
      <button class="btn-save" onclick="changeDisplayName()">İsmi Güncelle</button>
      <div class="settings-msg" id="dn-msg"></div>
    </div>
  </div>
</main>

<!-- Edit Modal -->
<div class="modal-overlay" id="modal-edit">
  <div class="modal-box">
    <div class="modal-title">✏️ Yorumu Düzenle</div>
    <input type="hidden" id="edit-postid">
    <input type="hidden" id="edit-cid">
    <div class="modal-field">
      <label>Yorum İçeriği</label>
      <textarea id="edit-content"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-modal btn-modal-primary" onclick="saveComment()">Kaydet</button>
      <button class="btn-modal btn-modal-cancel" onclick="closeModal()">İptal</button>
    </div>
  </div>
</div>

<footer><p>© 2026 BORALANCES — User Portal</p></footer>

<script>
const FB = 'https://hcca-6cb53-default-rtdb.europe-west1.firebasedatabase.app';
let myComments = [], allPosts = [], currentUser = null;

function authGet() {
  try {
    const s = JSON.parse(localStorage.getItem('bora_auth') || 'null');
    if (!s || Date.now() > s.expires) { localStorage.removeItem('bora_auth'); return null; }
    return s;
  } catch(e) { return null; }
}

function logout() {
  localStorage.removeItem('bora_auth');
  location.href = 'login.html';
}

// Guard
(function() {
  const auth = authGet();
  if (!auth) {
    location.href = 'login.html?r=kullanici-panel.html';
    return;
  }
  currentUser = auth;
  document.getElementById('nav-user').textContent = auth.displayName || auth.user;

  // Role badge
  const badge = document.getElementById('nav-role-badge');
  if (auth.role === 'admin') { badge.textContent = '👑 Admin'; badge.className = 'nav-badge badge-admin'; }
  else if (auth.role === 'moderator') { badge.textContent = '🛡️ Moderatör'; badge.className = 'nav-badge badge-mod'; }
  else { badge.textContent = '👤 Kullanıcı'; badge.className = 'nav-badge badge-user'; }
})();

// Firebase
async function fbGet(path) { return (await fetch(`${FB}/${path}.json`)).json(); }
async function fbPut(path, data) { await fetch(`${FB}/${path}.json`, {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}); }
async function fbDelete(path) { await fetch(`${FB}/${path}.json`, {method:'DELETE'}); }

function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Tabs
function showSection(name, btn) {
  document.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel-section').forEach(s => s.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.getElementById('sec-' + name).classList.add('active');
}

// Load
async function loadProfile() {
  if (!currentUser) return;
  try {
    const [userData, postsData, commentsData] = await Promise.all([
      fbGet(`users/${currentUser.user}`),
      fbGet('blog/posts'),
      fbGet('blog/comments')
    ]);

    // Profile info
    if (userData) {
      document.getElementById('display-name').textContent = userData.displayName || currentUser.user;
      document.getElementById('username').textContent = '@' + currentUser.user;
      document.getElementById('avatar').textContent = (userData.displayName || currentUser.user).charAt(0).toUpperCase();
      document.getElementById('new-display').value = userData.displayName || '';
      
      const roleMap = {admin: '👑 Admin', moderator: '🛡️ Mod', user: '👤 Kullanıcı'};
      document.getElementById('ps-role').textContent = roleMap[userData.role] || '👤';

      if (userData.createdAt) {
        document.getElementById('ps-joined').textContent = new Date(userData.createdAt).toLocaleDateString('tr-TR', {month:'short',year:'numeric'});
      }
    }

    // Posts
    allPosts = postsData ? Object.entries(postsData).map(([id, p]) => ({...p, id})) : [];

    // My comments
    myComments = [];
    if (commentsData) {
      for (const [postId, comments] of Object.entries(commentsData)) {
        if (comments) {
          for (const [cId, c] of Object.entries(comments)) {
            if (c.author === currentUser.user || c.author === (userData?.displayName||'')) {
              myComments.push({...c, id: cId, postId});
            }
          }
        }
      }
    }
    myComments.sort((a,b) => (b.createdAt||0)-(a.createdAt||0));

    document.getElementById('ps-comments').textContent = myComments.length;
    renderMyComments();

  } catch(e) { console.error(e); }
}

function renderMyComments() {
  const container = document.getElementById('my-comments-list');
  if (!myComments.length) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">💬</div><p>Henüz yorum yapmadın. Blog yazılarına yorum yapabilirsin!</p></div>';
    return;
  }
  container.innerHTML = myComments.map(c => {
    const post = allPosts.find(p => p.id === c.postId);
    const date = c.createdAt ? new Date(c.createdAt).toLocaleString('tr-TR') : '';
    return `<div class="my-comment${c.pinned ? ' pinned' : ''}">
      <div class="my-comment-header">
        <span class="my-comment-post">📝 ${escHtml(post?.title || 'Bilinmeyen yazı')}</span>
        <span class="my-comment-date">${date}${c.pinned ? ' · 📌 Sabitlenmiş' : ''}</span>
      </div>
      <div class="my-comment-text">${escHtml(c.content)}</div>
      <div class="my-comment-actions">
        <button class="btn-sm btn-edit" onclick="openEdit('${c.postId}','${c.id}')">✏️ Düzenle</button>
        <button class="btn-sm btn-delete" onclick="deleteComment('${c.postId}','${c.id}')">🗑 Sil</button>
      </div>
    </div>`;
  }).join('');
}

function openEdit(postId, cId) {
  const c = myComments.find(x => x.id === cId && x.postId === postId);
  if (!c) return;
  document.getElementById('edit-postid').value = postId;
  document.getElementById('edit-cid').value = cId;
  document.getElementById('edit-content').value = c.content || '';
  document.getElementById('modal-edit').classList.add('show');
}

function closeModal() {
  document.getElementById('modal-edit').classList.remove('show');
}

async function saveComment() {
  const postId = document.getElementById('edit-postid').value;
  const cId = document.getElementById('edit-cid').value;
  const content = document.getElementById('edit-content').value.trim();
  if (!content) return;
  try {
    const c = await fbGet(`blog/comments/${postId}/${cId}`);
    if (!c) return;
    c.content = content;
    c.updatedAt = Date.now();
    await fbPut(`blog/comments/${postId}/${cId}`, c);
    closeModal();
    await loadProfile();
  } catch(e) { alert('Hata: ' + e.message); }
}

async function deleteComment(postId, cId) {
  if (!confirm('Bu yorumu silmek istediğine emin misin?')) return;
  try {
    await fbDelete(`blog/comments/${postId}/${cId}`);
    await loadProfile();
  } catch(e) { alert('Silme hatası: ' + e.message); }
}

// Change password
async function changePassword() {
  const current = document.getElementById('pw-current').value;
  const newPw = document.getElementById('pw-new').value;
  const newPw2 = document.getElementById('pw-new2').value;
  const msg = document.getElementById('pw-msg');

  if (!current || !newPw || !newPw2) { msg.textContent = '⚠ Tüm alanları doldurun.'; msg.style.color = 'var(--red)'; return; }
  if (newPw.length < 6) { msg.textContent = '⚠ Yeni şifre en az 6 karakter olmalı.'; msg.style.color = 'var(--red)'; return; }
  if (newPw !== newPw2) { msg.textContent = '⚠ Şifreler eşleşmiyor.'; msg.style.color = 'var(--red)'; return; }

  try {
    const userData = await fbGet(`users/${currentUser.user}`);
    if (!userData || userData.password !== current) {
      msg.textContent = '✗ Mevcut şifre yanlış.'; msg.style.color = 'var(--red)'; return;
    }
    userData.password = newPw;
    await fbPut(`users/${currentUser.user}`, userData);
    msg.textContent = '✓ Şifre başarıyla değiştirildi!'; msg.style.color = 'var(--green)';
    document.getElementById('pw-current').value = '';
    document.getElementById('pw-new').value = '';
    document.getElementById('pw-new2').value = '';
  } catch(e) {
    msg.textContent = '✗ Hata: ' + e.message; msg.style.color = 'var(--red)';
  }
}

// Change display name
async function changeDisplayName() {
  const newName = document.getElementById('new-display').value.trim();
  const msg = document.getElementById('dn-msg');

  if (!newName) { msg.textContent = '⚠ İsim boş olamaz.'; msg.style.color = 'var(--red)'; return; }

  try {
    const userData = await fbGet(`users/${currentUser.user}`);
    if (!userData) return;
    userData.displayName = newName;
    await fbPut(`users/${currentUser.user}`, userData);

    // Update session
    const session = JSON.parse(localStorage.getItem('bora_auth'));
    session.displayName = newName;
    localStorage.setItem('bora_auth', JSON.stringify(session));

    msg.textContent = '✓ İsim güncellendi!'; msg.style.color = 'var(--green)';
    document.getElementById('display-name').textContent = newName;
    document.getElementById('avatar').textContent = newName.charAt(0).toUpperCase();
    document.getElementById('nav-user').textContent = newName;
  } catch(e) {
    msg.textContent = '✗ Hata: ' + e.message; msg.style.color = 'var(--red)';
  }
}

loadProfile();
</script>
