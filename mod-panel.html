<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Boralances · Moderatör Panel</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#060a12;--bg2:#0c1422;--bg3:#111d2e;
  --cyan:#0ff;--magenta:#f0f;--blue:#388bfd;
  --text:#e8f0fe;--text2:#8aaccc;--text3:#4a6580;
  --green:#3de8a0;--red:#f85149;
}
body{font-family:'Rajdhani',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.cyber-grid{position:fixed;inset:0;background:linear-gradient(90deg,rgba(0,255,255,0.02) 1px,transparent 1px),linear-gradient(rgba(0,255,255,0.02) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;z-index:0}

/* Header */
header{position:relative;z-index:10;padding:16px 0;background:rgba(10,14,39,0.9);backdrop-filter:blur(10px);border-bottom:2px solid var(--cyan);box-shadow:0 0 30px rgba(0,255,255,0.3)}
nav{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;padding:0 24px;flex-wrap:wrap;gap:12px}
.logo{font-size:22px;font-weight:900;font-family:'Orbitron',sans-serif;color:var(--cyan);text-shadow:0 0 15px var(--cyan);letter-spacing:3px;text-decoration:none}
.nav-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.nav-badge{font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;padding:4px 12px;border-radius:6px;background:rgba(0,255,255,0.12);border:1px solid rgba(0,255,255,0.35);color:var(--cyan)}
.nav-user{font-size:13px;color:var(--text2)}
.btn-nav{font-size:12px;padding:6px 14px;border-radius:6px;cursor:pointer;border:1px solid rgba(255,255,255,0.1);background:none;color:var(--text3);font-family:'Rajdhani',sans-serif;font-weight:600;transition:all 0.2s;text-decoration:none}
.btn-nav:hover{border-color:rgba(0,255,255,0.3);color:var(--cyan)}
.btn-logout{border-color:rgba(248,81,73,0.3);color:var(--red)}
.btn-logout:hover{background:rgba(248,81,73,0.1);border-color:var(--red)}

/* Layout */
main{position:relative;z-index:5;max-width:1100px;margin:0 auto;padding:32px 24px}

/* Page Title */
.page-title{display:flex;align-items:center;gap:14px;margin-bottom:32px}
.page-title h1{font-family:'Orbitron',sans-serif;font-size:clamp(1.4rem,3vw,2rem);color:var(--cyan);text-shadow:0 0 20px rgba(0,255,255,0.5);letter-spacing:3px}

/* Tabs */
.panel-tabs{display:flex;gap:4px;margin-bottom:28px;border-bottom:1px solid rgba(0,255,255,0.15);padding-bottom:0;flex-wrap:wrap}
.panel-tab{padding:12px 20px;font-size:13px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;
  cursor:pointer;background:none;border:none;color:var(--text3);transition:all 0.2s;
  border-bottom:2px solid transparent;font-family:'Rajdhani',sans-serif}
.panel-tab:hover{color:var(--text2)}
.panel-tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.panel-tab .tab-count{font-size:10px;background:rgba(0,255,255,0.12);color:var(--cyan);padding:1px 6px;border-radius:8px;margin-left:6px}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:32px}
.stat-card{background:rgba(12,20,34,0.8);border:1px solid rgba(0,255,255,0.12);border-radius:12px;padding:24px;transition:all 0.3s}
.stat-card:hover{border-color:rgba(0,255,255,0.3);transform:translateY(-2px)}
.stat-icon{font-size:28px;margin-bottom:8px}
.stat-value{font-family:'Orbitron',sans-serif;font-size:2rem;font-weight:900;color:var(--cyan);text-shadow:0 0 10px rgba(0,255,255,0.3)}
.stat-label{font-size:12px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;margin-top:4px}

/* Sections */
.panel-section{display:none}
.panel-section.active{display:block;animation:fadeIn 0.3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Comment card */
.comment-card{background:rgba(12,20,34,0.6);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:16px;margin-bottom:10px;transition:all 0.2s}
.comment-card:hover{border-color:rgba(0,255,255,0.2)}
.comment-card.pinned{border-color:rgba(61,232,160,0.3);background:rgba(61,232,160,0.03)}
.comment-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:8px}
.comment-author{font-weight:700;color:var(--cyan);font-size:13px}
.comment-date{font-size:11px;color:var(--text3)}
.comment-post{font-size:11px;color:var(--magenta);margin-bottom:6px}
.comment-text{font-size:14px;color:var(--text2);line-height:1.5}
.comment-actions{display:flex;gap:4px;margin-top:10px;flex-wrap:wrap}
.pin-indicator{font-size:10px;color:var(--green);font-weight:700;letter-spacing:0.1em}

/* Buttons */
.btn-sm{font-size:11px;padding:4px 10px;border-radius:5px;cursor:pointer;border:none;font-family:'Rajdhani',sans-serif;font-weight:700;transition:all 0.15s;margin:0 2px}
.btn-edit-sm{background:rgba(0,255,255,0.1);border:1px solid rgba(0,255,255,0.25);color:var(--cyan)}
.btn-edit-sm:hover{background:rgba(0,255,255,0.2)}
.btn-pin{background:rgba(61,232,160,0.1);border:1px solid rgba(61,232,160,0.25);color:var(--green)}
.btn-pin:hover{background:rgba(61,232,160,0.2)}
.btn-delete{background:rgba(248,81,73,0.1);border:1px solid rgba(248,81,73,0.25);color:var(--red)}
.btn-delete:hover{background:rgba(248,81,73,0.2)}

/* Search */
.search-bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.search-input{flex:1;min-width:200px;padding:10px 16px;border-radius:8px;background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.1);color:var(--text);font-size:14px;font-family:'Rajdhani',sans-serif;outline:none;transition:border-color 0.2s}
.search-input:focus{border-color:rgba(0,255,255,0.4)}
.search-input::placeholder{color:var(--text3)}
.filter-select{padding:10px 14px;border-radius:8px;background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.1);color:var(--text);font-size:13px;font-family:'Rajdhani',sans-serif;outline:none;cursor:pointer}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal-box{background:rgba(12,20,34,0.98);border:1px solid rgba(0,255,255,0.3);border-radius:14px;padding:28px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.modal-title{font-family:'Orbitron',sans-serif;font-size:14px;color:var(--cyan);letter-spacing:0.12em;margin-bottom:20px}
.modal-field{margin-bottom:14px}
.modal-field label{display:block;font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
.modal-field textarea{width:100%;padding:10px 14px;border-radius:8px;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.1);color:var(--text);font-size:14px;font-family:'Rajdhani',sans-serif;outline:none;resize:vertical;min-height:100px}
.modal-actions{display:flex;gap:10px;margin-top:16px}
.btn-modal{padding:10px 20px;border-radius:8px;font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.12em;cursor:pointer;border:none;transition:all 0.2s}
.btn-modal-primary{background:linear-gradient(135deg,rgba(0,255,255,0.15),rgba(0,255,255,0.08));border:1px solid rgba(0,255,255,0.35);color:var(--cyan)}
.btn-modal-primary:hover{box-shadow:0 0 16px rgba(0,255,255,0.2)}
.btn-modal-cancel{background:none;border:1px solid rgba(255,255,255,0.1);color:var(--text3)}
.btn-modal-cancel:hover{border-color:rgba(248,81,73,0.3);color:var(--red)}

/* Empty */
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state .empty-icon{font-size:48px;margin-bottom:12px;opacity:0.5}

/* Footer */
footer{position:relative;z-index:10;text-align:center;padding:24px;background:rgba(10,14,39,0.9);border-top:2px solid var(--cyan);box-shadow:0 0 20px rgba(0,255,255,0.3);margin-top:60px}
footer p{color:var(--cyan);font-size:13px;letter-spacing:0.1em}

@media(max-width:768px){.panel-tabs{gap:0}.panel-tab{padding:10px 12px;font-size:11px}.stats-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="cyber-grid"></div>

<header>
  <nav>
    <a href="index.html" class="logo">BORALANCES</a>
    <div class="nav-right">
      <span class="nav-badge">🛡️ Moderatör</span>
      <span class="nav-user" id="nav-user"></span>
      <a href="blog.html" class="btn-nav">Blog</a>
      <a href="index.html" class="btn-nav">Ana Sayfa</a>
      <button class="btn-nav btn-logout" onclick="logout()">Çıkış</button>
    </div>
  </nav>
</header>

<main>
  <div class="page-title">
    <span style="font-size:2rem">🛡️</span>
    <h1>MODERATÖR PANELİ</h1>
  </div>

  <!-- TABS -->
  <div class="panel-tabs">
    <button class="panel-tab active" onclick="showSection('overview',this)">📊 Genel Bakış</button>
    <button class="panel-tab" onclick="showSection('comments',this)">💬 Yorumlar <span class="tab-count" id="tc-comments"></span></button>
  </div>

  <!-- OVERVIEW -->
  <div class="panel-section active" id="sec-overview">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">💬</div>
        <div class="stat-value" id="s-total">-</div>
        <div class="stat-label">Toplam Yorum</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📌</div>
        <div class="stat-value" id="s-pinned">-</div>
        <div class="stat-label">Sabitlenmiş</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📅</div>
        <div class="stat-value" id="s-today">-</div>
        <div class="stat-label">Bugün Yapılan</div>
      </div>
    </div>

    <h3 style="font-family:'Orbitron',sans-serif;font-size:14px;color:var(--cyan);letter-spacing:0.15em;margin-bottom:16px">SON YORUMLAR</h3>
    <div id="recent-comments"></div>
  </div>

  <!-- COMMENTS -->
  <div class="panel-section" id="sec-comments">
    <div class="search-bar">
      <input class="search-input" id="comment-search" placeholder="Yorumlarda ara..." oninput="filterComments()">
      <select class="filter-select" id="comment-filter" onchange="filterComments()">
        <option value="">Tüm Yorumlar</option>
        <option value="pinned">Sabitlenmiş</option>
        <option value="today">Bugün</option>
      </select>
    </div>
    <div id="all-comments"></div>
  </div>
</main>

<!-- Edit Modal -->
<div class="modal-overlay" id="modal-edit">
  <div class="modal-box">
    <div class="modal-title">✏️ Yorumu Düzenle</div>
    <input type="hidden" id="edit-postid">
    <input type="hidden" id="edit-cid">
    <div class="modal-field">
      <label>Yorum İçeriği</label>
      <textarea id="edit-content"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-modal btn-modal-primary" onclick="saveComment()">Kaydet</button>
      <button class="btn-modal btn-modal-cancel" onclick="closeModal()">İptal</button>
    </div>
  </div>
</div>

<footer><p>© 2026 BORALANCES — Moderation Center</p></footer>

<script>
const FB = 'https://hcca-6cb53-default-rtdb.europe-west1.firebasedatabase.app';
let allPosts = [], allComments = [];

function authGet() {
  try {
    const s = JSON.parse(localStorage.getItem('bora_auth') || 'null');
    if (!s || Date.now() > s.expires) { localStorage.removeItem('bora_auth'); return null; }
    return s;
  } catch(e) { return null; }
}

function logout() {
  localStorage.removeItem('bora_auth');
  location.href = 'login.html';
}

// Guard
(function() {
  const auth = authGet();
  if (!auth || (auth.role !== 'moderator' && auth.role !== 'admin')) {
    alert('Bu sayfaya erişim yetkiniz yok. Moderatör veya admin olmalısınız.');
    location.href = 'login.html';
    return;
  }
  document.getElementById('nav-user').textContent = auth.displayName || auth.user;
})();

// Firebase
async function fbGet(path) { return (await fetch(`${FB}/${path}.json`)).json(); }
async function fbPut(path, data) { await fetch(`${FB}/${path}.json`, {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}); }
async function fbDelete(path) { await fetch(`${FB}/${path}.json`, {method:'DELETE'}); }

function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Tabs
function showSection(name, btn) {
  document.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel-section').forEach(s => s.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.getElementById('sec-' + name).classList.add('active');
}

// Load
async function loadAll() {
  try {
    const [postsData, commentsData] = await Promise.all([
      fbGet('blog/posts'),
      fbGet('blog/comments')
    ]);

    allPosts = postsData ? Object.entries(postsData).map(([id, p]) => ({...p, id})) : [];
    
    allComments = [];
    if (commentsData) {
      for (const [postId, comments] of Object.entries(commentsData)) {
        if (comments) {
          for (const [cId, c] of Object.entries(comments)) {
            allComments.push({...c, id: cId, postId});
          }
        }
      }
    }
    allComments.sort((a,b) => (b.createdAt||0)-(a.createdAt||0));

    renderOverview();
    renderAllComments();
  } catch(e) { console.error(e); }
}

function renderOverview() {
  const today = new Date(); today.setHours(0,0,0,0);
  const todayComments = allComments.filter(c => c.createdAt && c.createdAt >= today.getTime());
  
  document.getElementById('s-total').textContent = allComments.length;
  document.getElementById('s-pinned').textContent = allComments.filter(c => c.pinned).length;
  document.getElementById('s-today').textContent = todayComments.length;

  const recent = allComments.slice(0, 6);
  const container = document.getElementById('recent-comments');
  if (!recent.length) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">💬</div><p>Henüz yorum yok</p></div>';
    return;
  }
  container.innerHTML = buildCommentCards(recent);
}

function renderAllComments(filtered) {
  const comments = filtered || allComments;
  document.getElementById('tc-comments').textContent = comments.length;
  const container = document.getElementById('all-comments');
  if (!comments.length) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">💬</div><p>Yorum bulunamadı</p></div>';
    return;
  }
  container.innerHTML = buildCommentCards(comments);
}

function buildCommentCards(comments) {
  return comments.map(c => {
    const post = allPosts.find(p => p.id === c.postId);
    const date = c.createdAt ? new Date(c.createdAt).toLocaleString('tr-TR') : '';
    return `<div class="comment-card${c.pinned ? ' pinned' : ''}">
      <div class="comment-header">
        <div>
          <span class="comment-author">${escHtml(c.author)}</span>
          ${c.pinned ? '<span class="pin-indicator" style="margin-left:8px">📌 Sabitlenmiş</span>' : ''}
        </div>
        <span class="comment-date">${date}</span>
      </div>
      <div class="comment-post">📝 ${escHtml(post?.title || 'Bilinmeyen yazı')}</div>
      <div class="comment-text">${escHtml(c.content)}</div>
      <div class="comment-actions">
        <button class="btn-sm btn-edit-sm" onclick="openEdit('${c.postId}','${c.id}')">✏️ Düzenle</button>
        <button class="btn-sm btn-pin" onclick="togglePin('${c.postId}','${c.id}',${!c.pinned})">${c.pinned ? '📌 Sabiti Kaldır' : '📌 Sabitle'}</button>
        <button class="btn-sm btn-delete" onclick="deleteComment('${c.postId}','${c.id}')">🗑 Sil</button>
      </div>
    </div>`;
  }).join('');
}

function filterComments() {
  const q = document.getElementById('comment-search').value.toLowerCase();
  const filter = document.getElementById('comment-filter').value;
  const today = new Date(); today.setHours(0,0,0,0);
  
  const filtered = allComments.filter(c => {
    const matchQ = !q || (c.content||'').toLowerCase().includes(q) || (c.author||'').toLowerCase().includes(q);
    let matchF = true;
    if (filter === 'pinned') matchF = c.pinned;
    if (filter === 'today') matchF = c.createdAt && c.createdAt >= today.getTime();
    return matchQ && matchF;
  });
  renderAllComments(filtered);
}

function openEdit(postId, cId) {
  const c = allComments.find(x => x.id === cId && x.postId === postId);
  if (!c) return;
  document.getElementById('edit-postid').value = postId;
  document.getElementById('edit-cid').value = cId;
  document.getElementById('edit-content').value = c.content || '';
  document.getElementById('modal-edit').classList.add('show');
}

function closeModal() {
  document.getElementById('modal-edit').classList.remove('show');
}

async function saveComment() {
  const postId = document.getElementById('edit-postid').value;
  const cId = document.getElementById('edit-cid').value;
  const content = document.getElementById('edit-content').value.trim();
  if (!content) return;
  try {
    const c = await fbGet(`blog/comments/${postId}/${cId}`);
    if (!c) return;
    c.content = content;
    c.updatedAt = Date.now();
    c.editedBy = authGet()?.user || 'moderator';
    await fbPut(`blog/comments/${postId}/${cId}`, c);
    closeModal();
    await loadAll();
  } catch(e) { alert('Hata: ' + e.message); }
}

async function togglePin(postId, cId, pin) {
  try {
    const c = await fbGet(`blog/comments/${postId}/${cId}`);
    if (!c) return;
    c.pinned = pin;
    await fbPut(`blog/comments/${postId}/${cId}`, c);
    await loadAll();
  } catch(e) { alert('Hata: ' + e.message); }
}

async function deleteComment(postId, cId) {
  if (!confirm('Bu yorumu silmek istediğine emin misin?')) return;
  try {
    await fbDelete(`blog/comments/${postId}/${cId}`);
    await loadAll();
  } catch(e) { alert('Silme hatası: ' + e.message); }
}

loadAll();
</script>
</body>
</html>
