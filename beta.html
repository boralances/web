<!DOCTYPE html>
<html>
<head>
    <title>Boralances - MUN Chair Login</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
</head>
<body style="background: #0d0d0d; color: #00ffcc; font-family: sans-serif; text-align: center;">

    <h2>🤖 [SYSTEM]: Phone Verification</h2>

    <input type="text" id="phone" placeholder="+905XXXXXXXXX" style="padding: 10px;">
    <button onclick="sendCode()" style="padding: 10px; cursor: pointer;">Kod Gönder</button>

    <br><br>

    <input type="text" id="verificationCode" placeholder="Gelen Kodu Girin" style="padding: 10px;">
    <button onclick="verifyCode()" style="padding: 10px; cursor: pointer;">Kodu Doğrula</button>

    <div id="recaptcha-container"></div>

    <script>
        // 1. Firebase Yapılandırması
        const firebaseConfig = {
            apiKey: "SENIN_API_KEYIN",
            authDomain: "proje-id.firebaseapp.com",
            projectId: "proje-id",
            storageBucket: "proje-id.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef"
        };
        firebase.initializeApp(firebaseConfig);

        // 2. reCAPTCHA'yı Hazırla
        window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
            'size': 'invisible'
        });

        // 3. Kodu Gönderen Fonksiyon
        function sendCode() {
            const phoneNumber = document.getElementById('phone').value;
            const appVerifier = window.recaptchaVerifier;

            firebase.auth().signInWithPhoneNumber(phoneNumber, appVerifier)
                .then((confirmationResult) => {
                    window.confirmationResult = confirmationResult;
                    alert("✅ Kod başarıyla gönderildi!");
                }).catch((error) => {
                    console.error("Hata:", error);
                    alert("❌ Gönderilemedi: " + error.message);
                });
        }

        // 4. Gelen Kodu Doğrulayan Fonksiyon
        function verifyCode() {
            const code = document.getElementById('verificationCode').value;
            
            window.confirmationResult.confirm(code).then((result) => {
                const user = result.user;
                alert("🔓 Giriş Başarılı! Hoş geldin: " + user.phoneNumber);
            }).catch((error) => {
                alert("❌ Hatalı Kod!");
            });
        }
    </script>
</body>
</html>
